<script>

let page = 1;

let totalPages = 43; // प्रयास pages

const pdfViewer = document.getElementById("pdfViewer");

function updatePDF() {

pdfViewer.src =
"books/prayash.pdf#toolbar=0&navpanes=0&page=" + page;

}

function nextPage(){

if(page < totalPages){

page++;

updatePDF();

}

}

function prevPage(){

if(page > 1){

page--;

updatePDF();

}

}

</script>
