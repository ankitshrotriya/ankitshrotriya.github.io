<script>

let page = 1;
let totalPages = 63;

const pdfViewer = document.getElementById("pdfViewer");

function updatePDF() {

    pdfViewer.src =
    "books/smarika.pdf#toolbar=0&navpanes=0&page=" + page;

}

function nextPage(){

    if(page < totalPages){

        page++;
        updatePDF();

    }

}

function prevPage(){

    if(page > 1){

        page--;
        updatePDF();

    }

}

</script>
